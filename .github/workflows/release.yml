name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
          - os: macos-latest
            target_name: macos-arm64
          - os: macos-13
            target_name: macos-x86_64
          - os: windows-latest
            target_name: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Build release
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          DIST="rustpad-${GITHUB_REF_NAME}-${{ matrix.target_name }}"
          mkdir -p "$DIST"
          cp target/release/rustpad "$DIST"/
          cp README.md LICENSE "$DIST"/
          tar -czf "$DIST.tar.gz" "$DIST"
          echo "ASSET=$DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Dist = "rustpad-$env:GITHUB_REF_NAME-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $Dist | Out-Null
          Copy-Item target/release/rustpad.exe $Dist/
          Copy-Item README.md, LICENSE $Dist/
          Compress-Archive -Path "$Dist/*" -DestinationPath "$Dist.zip"
          "ASSET=$Dist.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RustPad ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true
