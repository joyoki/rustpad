name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v0.1.2)"
        required: true
        default: "v0.1.4"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: rustpad
          - os: windows-latest
            platform: windows-x86_64
            binary: rustpad.exe
          - os: macos-latest
            platform: macos-universal
            binary: rustpad

    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.platform }}-

      - name: Build release binary
        run: cargo build --release

      - name: Package (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p dist
          cp target/release/rustpad dist/
          chmod +x dist/rustpad
          tar -czf "dist/rustpad-${TAG}-linux-x86_64.tar.gz" -C dist rustpad
          ls -lh dist/

      - name: Package (Windows)
        if: matrix.platform == 'windows-x86_64'
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/rustpad.exe dist/
          Compress-Archive -Path dist/rustpad.exe -DestinationPath "dist/rustpad-${tag}-windows-x86_64.zip" -Force
          Get-ChildItem dist

      - name: Package (macOS)
        if: matrix.platform == 'macos-universal'
        env:
          SIGN_MODE: adhoc
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          APP_NAME="RustPad"
          mkdir -p dist
          APP_DIR="dist/${APP_NAME}.app"
          bash scripts/macos_package_app.sh "$APP_DIR" .
          bash scripts/macos_codesign.sh "$APP_DIR" .
          (cd dist && zip -rq "rustpad-${TAG}-macos.app.zip" "${APP_NAME}.app")
          DMG_PATH="dist/rustpad-${TAG}-macos.dmg"
          bash scripts/macos_create_dmg.sh "$APP_DIR" "$DMG_PATH"
          ls -lh dist/

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/checkout@v4
        with:
          ref: main
          path: release-meta

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.dmg" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: release-meta/docs/releases/${{ steps.meta.outputs.tag }}.md
          files: release-assets/*
          allow_updates: true
          make_latest: true
          fail_on_unmatched_files: true
